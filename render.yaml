services:
  - type: web
    name: agentic-chatbot-api
    runtime: python
    buildCommand: pip install uv && uv sync --frozen && uv cache prune --ci
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
